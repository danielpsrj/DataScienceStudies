version: '3.8'

services:
  # Streamlit application (development)
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: data-science-platform-streamlit-dev
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=sqlite:///./data.db
      - APP_ENV=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      - .:/app
    command: >
      sh -c "
        python -c 'from app.data.models import Base; from app.config import settings; from sqlalchemy import create_engine; engine = create_engine(settings.database_url); Base.metadata.create_all(bind=engine); print(\"Database tables created\")' &&
        python scripts/generate_fake_data.py &&
        uv run streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0
      "
    restart: unless-stopped

  # FastAPI backend (development)
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: data-science-platform-api-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data.db
      - APP_ENV=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - .:/app
    command: uv run uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      - streamlit